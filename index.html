<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tripy - Bike Taxi Service</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#ff6600;
color:white;
padding:20px;
text-align:center;
}

.hero{
padding:50px 20px;
text-align:center;
background:white;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
margin-bottom:20px;
}

.btn{
background:#ff6600;
color:white;
padding:12px 25px;
text-decoration:none;
border-radius:5px;
}

.container{
max-width:900px;
margin:30px auto;
padding:20px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#ff6600;
color:white;
border:none;
padding:12px 20px;
cursor:pointer;
border-radius:5px;
}

footer{
background:#222;
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}
</style>

</head>
<body>

<header>
<h1>TRIPY</h1>
<p>Fast & Affordable Bike Taxi Service</p>
</header>

<section class="hero">
<h1>Book Your Ride</h1>
<p>Bike Taxi • Parcel Delivery • Local Transport</p>
<a href="#booking" class="btn">Book Now</a>
</section>

<div class="container" id="booking">
<h2>Ride Booking Form</h2>

<form onsubmit="sendWhatsApp(); return false;">
<input type="text" id="name" placeholder="Your Name" required>

<input type="tel" id="mobile" placeholder="Mobile Number" required>

<input type="text" id="pickup" placeholder="Pickup Location" required>

<input type="text" id="drop" placeholder="Drop Location" required>

<button type="submit">Book Ride</button>
</form>
</div>

<div class="container">
<h2>Become a Rider</h2>

<form>
<input type="text" placeholder="Rider Name">

<input type="tel" placeholder="Mobile Number">

<input type="text" placeholder="Bike Number">

<button type="submit">Register</button>
</form>
</div>

<footer>
<p>Call Us: 9236764481</p>
<p>© 2026 TRIPY. All Rights Reserved.</p>
</footer>

<script>
function sendWhatsApp(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let pickup=document.getElementById("pickup").value;
let drop=document.getElementById("drop").value;

let message=
"TRIPY Ride Booking%0A%0A"+
"Name: "+name+"%0A"+
"Mobile: "+mobile+"%0A"+
"Pickup: "+pickup+"%0A"+
"Drop: "+drop;

window.open(
"https://wa.me/919236764481?text="+message,
"_blank"
);
}
</script>

</body>
</html>
