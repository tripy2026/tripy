<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIPY</title>

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
</head>
<body>

<header>
<h1>🚖 TRIPY</h1>
<p>Fast • Safe • Affordable</p>
</header>

<section class="hero">
<h2>Book Your Ride Instantly</h2>
<button onclick="showLogin()">
Login / Signup
</button>
</section>

<section class="card">

<h2>Ride Booking</h2>

<input
type="text"
id="pickup"
placeholder="Pickup Location">

<input
type="text"
id="drop"
placeholder="Drop Location">

<button onclick="bookRide()">
Book Ride
</button>

</section>

<section class="card">
<h2>Fare Calculator</h2>

<input
type="number"
id="km"
placeholder="Distance KM">

<button onclick="calculateFare()">
Calculate
</button>

<p id="fare"></p>

</section>

<section class="card">

<h2>🔐 Login / Signup</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="signup()">Signup</button>

<button onclick="login()">Login</button>

<p id="msg"></p>

</section>

<section class="card">

<h2>Current Location</h2>

<button onclick="getLocation()">
📍 Detect Location
</button>

<p id="location"></p>

</section>
<section class="card" id="dashboard" style="display:none;">

<h2>👤 User Dashboard</h2>

<p><b>Email:</b> <span id="userEmail"></span></p>

<p><b>Status:</b> Active User ✅</p>

<button onclick="logout()">Logout</button>

</section>

<div id="map"></div>

<script type="module" src="firebase.js"></script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module" src="app.js"></script>
  
</body>
</html>
