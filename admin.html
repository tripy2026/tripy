<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIPY Admin Panel</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#f4f4f4;
    font-family:Arial,sans-serif;
}

header{
    background:#ff6600;
    color:white;
    text-align:center;
    padding:20px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h2{
    margin-bottom:10px;
}

.stat{
    font-size:30px;
    font-weight:bold;
    color:#ff6600;
}
</style>

</head>
<body>

<header>
<h1>🚖 TRIPY Admin Dashboard</h1>
</header>

<div class="dashboard">

<div class="card">
<h2>Total Users</h2>
<div class="stat" id="users">0</div>
</div>

<div class="card">
<h2>Total Bookings</h2>
<div class="stat" id="bookings">0</div>
</div>

<div class="card">
<h2>Riders</h2>
<div class="stat" id="riders">0</div>
</div>

</div>

<div class="card" style="margin:20px;">
<h2>📍 Ride Requests</h2>

<table width="100%" border="1" cellpadding="10">
<tr>
<th>Name</th>
<th>Pickup</th>
<th>Drop</th>
<th>Status</th>
</tr>

<tr>
<td>Rahul</td>
<td>Jhansi</td>
<td>Sipri</td>
<td>Pending</td>
</tr>

<tr>
<td>Aman</td>
<td>Elite</td>
<td>Railway Station</td>
<td>Assigned</td>
</tr>

</table>
</div>

</body>
</html>
